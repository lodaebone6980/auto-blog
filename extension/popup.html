<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>NaviWrite</title>
  <link rel="stylesheet" href="popup.css" />
</head>
<body>
  <main>
    <header>
      <div>
        <p class="eyebrow">NaviWrite</p>
        <h1>확장 자동발행</h1>
      </div>
      <span id="loginBadge" class="badge">확인중</span>
    </header>

    <section class="panel">
      <label>서버 URL</label>
      <div class="row">
        <input id="apiBase" value="https://web-production-184ff.up.railway.app" />
        <button id="saveApi">저장</button>
      </div>
    </section>

    <section class="panel">
      <div class="row spread">
        <strong>네이버 로그인</strong>
        <button id="openLogin">로그인 열기</button>
      </div>
      <p id="loginText" class="muted">네이버 쿠키를 확인합니다.</p>
    </section>

    <section class="panel">
      <div class="row spread">
        <strong>계정 슬롯</strong>
        <button id="reloadAccounts">새로고침</button>
      </div>
      <div id="accounts" class="list"></div>
    </section>

    <section class="panel">
      <div class="row spread">
        <strong>발행 작업</strong>
        <button id="claimNext">다음 작업</button>
      </div>
      <div id="jobBox" class="job muted">대기 중인 작업을 가져오세요.</div>
      <div class="row">
        <button id="copyJob">원고 복사</button>
        <button id="openEditor">작성창 열기</button>
      </div>
    </section>
  </main>
  <script src="popup.js"></script>
</body>
</html>
